<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Bill | Hospital Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.15);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --nav-bg: rgba(15, 23, 42, 0.8);
            --accent: #f59e0b; /* Gold/Amber for Invoice */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(245, 158, 11, 0.08) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), #06b6d4);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #0f172a;
            font-size: 1.25rem;
            box-shadow: 0 4px 14px var(--primary-glow);
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav {
            display: flex;
            gap: 1.5rem;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--primary);
            background: rgba(16, 185, 129, 0.08);
        }

        .module-toggle {
            display: flex;
            background: rgba(30, 41, 59, 0.5);
            padding: 0.25rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .toggle-btn {
            padding: 0.5rem 1.2rem;
            border-radius: 17px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .toggle-btn.doctor {
            color: var(--text-muted);
        }

        .toggle-btn.doctor:hover {
            color: #38bdf8;
        }

        .toggle-btn.patient {
            background: var(--primary);
            color: #0f172a;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
        }

        .invoice-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 550px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: fadeIn 0.8s ease-out;
        }

        .invoice-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        .avatar-circle {
            width: 70px;
            height: 70px;
            background: rgba(245, 158, 11, 0.1);
            border: 2px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .card-title-group h2 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #e2e8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-title-group p {
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.2rem;
        }

        .invoice-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 2rem;
        }

        .invoice-table th {
            text-align: left;
            padding: 0.75rem 0;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
        }

        .invoice-table td {
            padding: 1.25rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 1.05rem;
        }

        .item-name {
            font-weight: 500;
            color: var(--text-main);
        }

        .item-price {
            text-align: right;
            font-weight: 600;
            color: var(--text-main);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.15);
            padding: 1.25rem 1.5rem;
            border-radius: 12px;
            margin-top: 1.5rem;
        }

        .total-label {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .total-price {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary);
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-section">
            <div class="logo-icon">H</div>
            <div class="logo-text">Hospital Management System</div>
        </div>
        <nav>
            <a href="/patient/" class="nav-link">Home</a>
            <a href="/patient/details/" class="nav-link">Details</a>
            <a href="/patient/report/" class="nav-link">Report</a>
            <a href="/patient/bill/" class="nav-link active">Bill</a>
        </nav>
        <div class="module-toggle">
            <a href="/doctor/" class="toggle-btn doctor">Doctor</a>
            <a href="/patient/" class="toggle-btn patient">Patient</a>
        </div>
    </header>

    <main>
        <div class="invoice-card">
            <div class="card-header">
                <div class="avatar-circle">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                </div>
                <div class="card-title-group">
                    <h2>Patient Bill</h2>
                    <p>Consultation Invoice</p>
                </div>
            </div>

            <table class="invoice-table">
                <thead>
                    <tr>
                        <th>Description</th>
                        <th style="text-align: right;">Amount</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="item-name">Consultation</td>
                        <td class="item-price">₹500</td>
                    </tr>
                    <tr>
                        <td class="item-name">Medicine</td>
                        <td class="item-price">₹850</td>
                    </tr>
                    <tr>
                        <td class="item-name">Lab Test</td>
                        <td class="item-price">₹1500</td>
                    </tr>
                </tbody>
            </table>

            <div class="total-row">
                <div class="total-label">Total Amount Due</div>
                <div class="total-price">₹2850</div>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 Hospital Management System. All rights reserved.
    </footer>

</body>
</html>
